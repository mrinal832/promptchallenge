services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/tripsync
      - JWT_SECRET=tripsync_super_secret_jwt_key_2026
      - CLIENT_URL=http://localhost:5173
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongodb

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - server

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
